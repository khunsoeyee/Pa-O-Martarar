<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&family=Pyidaungsu&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Padauk', 'Pyidaungsu', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        h2 { color: #2c3e50; font-size: 1.5rem; margin: 15px 0; }
        .book-container {
            width: 100%;
            max-width: 500px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .page-content {
            padding: 15px;
            min-height: 400px;
        }
        .page-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
            border: 1px solid #f0f0f0;
        }
        .text-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }
        button {
            padding: 10px 25px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .page-number { align-self: center; font-weight: bold; color: #7f8c8d; }
        
        .ad-container {
            text-align: center;
            margin: 10px 0;
            min-height: 55px;
        }
        
        footer { 
            width: 100%;
            text-align: center; 
            padding: 20px 0;
            margin-top: 10px;
        }
        footer a { color: #007bff; text-decoration: none; font-weight: bold; border: 1px solid #007bff; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>မာႏတြာႏကျမ်ꩻ</h2>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : 'bbfb6192df62c5edfd427d60974d99b1', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/bbfb6192df62c5edfd427d60974d99b1/invoke.js"></script>
    </div>

    <div class="book-container">
        <div class="page-content">
            <img id="page-img" src="" alt="Page Image" class="page-image">
            <div id="page-text" class="text-content"></div>
        </div>

        <div class="controls">
            <button id="prevBtn" onclick="changePage(-1)">နောက်သို့</button>
            <span class="page-number" id="pageNum"></span>
            <button id="nextBtn" onclick="changePage(1)">ရှေ့သို့</button>
        </div>
    </div>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : 'bbfb6192df62c5edfd427d60974d99b1', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/bbfb6192df62c5edfd427d60974d99b1/invoke.js"></script>
    </div>

    <footer>
        <a href="privacy-policy.html">Privacy Policy ဖတ်ရန်</a>
    </footer>

    <script>
        // စာမျက်နှာ အချက်အလက်များ
        const pages = [
            { img: "page1.jpg", text: `၁။ လူꩻရွုတ်ယိုနဝ်ꩻ -\nလိုပေႏယိုယွော့ဖင်ꩻအွဉ်ႏဒင်ႏ \nအစူထွေတပင်လောင်းတဲင်\nအစူအပင်စေႏနဝ်ꩻ အဝ်ႏနျꩻခါꩻလိုꩻပေႏဟို့ꩻနဝ်ꩻသွူ ။` },
            { img: "page2.jpg", text: `၂။ လူꩻရွုတ်ယိုနဝ်ꩻ -\nလိုပေႏယိုယွော့ဗေင်ႏတခြို့သော့ꩻ \nအစူထွေတပင်လောင်းတဲင်\nအစူအပင်စေႏနဝ်ꩻ အဝ်ႏတိတ်ꩻခါꩻလိုꩻပေႏငင်းအုံႏနဝ်ꩻသွူ ။` },
            { img: "page3.jpg", text: `လူꩻရွုတ်ယို အစူစေႏတပင်နဝ်ꩻ \nအဝ်ႏသဲဉ်ꩻလိုꩻပေႏငင်းဒေင်တဲင် \nအစူထွေတပင်နဝ်ꩻအဝ်ႏတိတ်ꩻခါꩻ \nလိုꩻပေႏကတူႏပွုံႏနဝ်ꩻသွူ။` },
            { img: "page4.jpg", text: `၄။ လူꩻရွုတ်ယို အစူစေႏတပင်နဝ်ꩻ \nအဝ်ႏသဲဉ်ꩻခါꩻလိုꩻပေႏတဲင် \nအစူထွေတပင်နဝ်ꩻအဝ်ႏဗို့ꩻလိုꩻပေႏဖြောင်းကိုနဝ်ꩻသွူ။` },
            { img: "page5.jpg", text: `၅။ လူꩻရွုတ်ယို အစူတပင်နဝ်ꩻ \nအဝ်ႏသဲဉ်ꩻခါꩻ လိုꩻပေႏစူတဲင် \nတပင်နဝ်ꩻအဝ်ႏသဲဉ်ꩻခါꩻလိုꩻပေႏခင်ႏနဝ်ꩻသွူ။` },
            { img: "page6.jpg", text: `၆။ လူꩻရွုတ်ယို အစူတပင်နဝ်ꩻ \nအဝ်ႏခွူမ်ꩻလိုꩻပေႏငွဉ်ꩻထျꩻတဲင် \nတပင်နဝ်ꩻအဝ်ႏအွဉ်ႏဒင်ႏလိုꩻပေႏကတူႏနဝ်ꩻသွူ။` },
            { img: "page7.jpg", text: `၇။ လူꩻရွုတ်ယိုနဝ်ꩻ အစူနီပင် အဝ်ႏပေ့ꩻခါꩻ \nလိုꩻပေႏမဲ့နားနီပင်သွူ ။` },
            { img: "page8.jpg", text: `၈။ လူꩻရွုတ်ယို အစူတပင်နဝ်ꩻအဝ်ႏခွူမ်ခါꩻ\nလိုꩻပေႏတဲင် မဲ့အဝ်ႏထွားတောႏလိုꩻပေႏ \nအစူတပင်နဝ်ꩻအဝ်ႏယွိုင်ႏ မာꩻနုဲင်းအီႏတွဲႏလိုꩻပေႏသွူ။` },
            { img: "page9.jpg", text: `၉။ လူꩻရွုတ်ယို အစူတပင်နဝ်ꩻအဝ်ႏယွော့လိုꩻပေႏတဲင်\nမဲ့အဝ်ႏထွားကီ တပင်နဝ်ꩻအဝ်ႏယီးကီထင်ႏထာꩻနော။` },
            { img: "page10.jpg", text: `၁၀။ လူꩻရွုတ်ယိုနဝ်ꩻ ယွော့ပါတောမ်ႏလိုꩻပေႏ\nထင်ႏအဝ်ႏအုံလင်ꩻထာꩻ သေႏပင်ခါႏသွူ ။` },
            { img: "page11.jpg", text: `၁၁။ လူꩻရွုတ်ယို ယွော့တောမ်ႏလိုꩻပေႏ\nထင်ႏအုံလင်ꩻထာꩻလမ်းခေါင်ႏလောင်းသွူ ။` },
            { img: "page12.jpg", text: `၁၂။ လူꩻရွုတ်ယို အစူတပင်နဝ်ꩻ အဝ်ႏခွူမ်\nလိုꩻပေႏစူ အစူတပင်နဝ်ꩻ ခွူမ်တောမ်ႏငလာႏ\nမာင်းအီႏတွဲႏလိုꩻပေႏသွူ ။` },
            { img: null, text: `၁၃။ (နမ်းသꩻနီပါꩻချမ်ꩻချမ်ꩻသာႏသာႏယမ်ကအဝ်ႏတသေႏသေႏသွော့ဩ)` }
        ];

        let currentIndex = 0;

        function updatePage() {
            const imgElement = document.getElementById('page-img');
            const textElement = document.getElementById('page-text');
            const numElement = document.getElementById('pageNum');

            // ပုံရှိမရှိ စစ်ဆေးပြီး လမ်းကြောင်းမှန်အောင် ခေါ်ယူခြင်း
            if (pages[currentIndex].img) {
                // Custom Domain မှာ ပုံတွေကို တိုက်ရိုက်ခေါ်ရန်
                imgElement.src = pages[currentIndex].img;
                imgElement.style.display = "block";
            } else {
                imgElement.style.display = "none";
            }

            textElement.innerText = pages[currentIndex].text;
            numElement.innerText = (currentIndex + 1) + " / " + pages.length;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === pages.length - 1;
        }

        function changePage(step) {
            currentIndex += step;
            updatePage();
            window.scrollTo(0, 0);
        }

        // စတင်ချိန်တွင် ပထမဆုံးစာမျက်နှာကို ပြရန်
        updatePage();
    </script>
</body>
</html>
